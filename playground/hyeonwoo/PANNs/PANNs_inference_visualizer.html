<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PANNs Inference Visualizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Courier New', monospace;
    background: #0d0d0d;
    color: #e0e0e0;
    min-height: 100vh;
  }

  header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: normal;
    letter-spacing: 0.15em;
    color: #fff;
    text-transform: uppercase;
  }

  header p {
    font-size: 0.72rem;
    color: #555;
    letter-spacing: 0.05em;
    margin-top: 4px;
  }

  .upload-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 1.5rem;
    padding: 2rem;
  }

  .upload-box {
    border: 1px dashed #333;
    border-radius: 4px;
    padding: 3rem 4rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .upload-box:hover, .upload-box.drag { border-color: #4af; background: rgba(68,170,255,0.04); }

  .upload-box input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-box .icon {
    font-size: 2.5rem;
    color: #333;
    display: block;
    margin-bottom: 1rem;
  }

  .upload-box .label {
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    color: #666;
    text-transform: uppercase;
  }

  .upload-box .sublabel {
    font-size: 0.68rem;
    color: #444;
    margin-top: 6px;
    letter-spacing: 0.04em;
  }

  #dashboard { display: none; padding: 2rem 2.5rem; }

  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1px;
    background: #1a1a1a;
    border: 1px solid #1a1a1a;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 2rem;
  }

  .metric {
    background: #0d0d0d;
    padding: 1.2rem 1.5rem;
  }

  .metric .val {
    font-size: 1.8rem;
    font-weight: normal;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .metric .lbl {
    font-size: 0.65rem;
    color: #555;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .metric .val.accent { color: #4af; }
  .metric .val.warn { color: #fa4; }

  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: #1a1a1a;
    border: 1px solid #1a1a1a;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 2rem;
  }

  .chart-panel {
    background: #0d0d0d;
    padding: 1.5rem;
  }

  .chart-panel h2 {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 1rem;
    font-weight: normal;
  }

  .chart-wrap { position: relative; height: 220px; }

  .score-rows { display: flex; flex-direction: column; gap: 10px; }

  .score-row { display: flex; align-items: center; gap: 10px; font-size: 0.72rem; }

  .score-row .name { color: #888; width: 72px; flex-shrink: 0; letter-spacing: 0.04em; }

  .score-row .bar-bg {
    flex: 1;
    height: 4px;
    background: #1a1a1a;
    border-radius: 2px;
    overflow: hidden;
  }

  .score-row .bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

  .score-row .nums { color: #555; width: 90px; text-align: right; flex-shrink: 0; font-size: 0.65rem; }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: inherit;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid #222;
    background: transparent;
    color: #555;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: #444; color: #aaa; }
  .filter-btn.active { border-color: #4af; color: #4af; background: rgba(68,170,255,0.08); }

  .search-wrap { margin-left: auto; }

  .search-wrap input {
    font-family: inherit;
    font-size: 0.72rem;
    background: #111;
    border: 1px solid #222;
    color: #aaa;
    padding: 5px 10px;
    border-radius: 2px;
    width: 180px;
    outline: none;
    letter-spacing: 0.04em;
  }

  .search-wrap input:focus { border-color: #4af; }

  .table-wrap { overflow-x: auto; border: 1px solid #1a1a1a; border-radius: 4px; }

  table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }

  thead th {
    background: #111;
    padding: 8px 12px;
    text-align: left;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #555;
    font-weight: normal;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
    border-bottom: 1px solid #1a1a1a;
  }

  thead th:hover { color: #aaa; }
  thead th.sorted { color: #4af; }

  tbody tr { border-bottom: 1px solid #111; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #111; }

  td { padding: 9px 12px; vertical-align: middle; }

  td.filename { color: #444; font-size: 0.65rem; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  td.category { color: #ccc; }
  td.prediction { color: #888; }
  td.prob { text-align: right; font-variant-numeric: tabular-nums; }

  .badge {
    display: inline-block;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 2px;
  }

  .badge.hit { background: rgba(80,200,120,0.12); color: #5c8; border: 1px solid rgba(80,200,120,0.2); }
  .badge.miss { background: rgba(255,80,80,0.08); color: #f66; border: 1px solid rgba(255,80,80,0.15); }

  td.score {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-size: 0.68rem;
    color: #555;
  }

  .file-info {
    font-size: 0.68rem;
    color: #444;
    margin-bottom: 1.5rem;
    letter-spacing: 0.04em;
  }

  .file-info span { color: #4af; }

  @media (max-width: 700px) {
    .charts-row { grid-template-columns: 1fr; }
    header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>PANNs Inference Visualizer</h1>
    <p>CNN6 × AudioSet — ESC-50 inference results</p>
  </div>
  <div id="reload-btn" style="display:none">
    <button class="filter-btn" onclick="resetUpload()">↩ 다른 파일 열기</button>
  </div>
</header>

<div class="upload-zone" id="upload-zone">
  <div class="upload-box" id="drop-zone">
    <input type="file" accept=".csv" id="file-input">
    <span class="icon">⬡</span>
    <div class="label">inference_results.csv 업로드</div>
    <div class="sublabel">클릭하거나 파일을 드래그하세요</div>
  </div>
</div>

<div id="dashboard">
  <div class="file-info" id="file-info"></div>

  <div class="metrics" id="metrics"></div>

  <div class="charts-row">
    <div class="chart-panel">
      <h2>카테고리별 top-1 확률 분포</h2>
      <div class="chart-wrap"><canvas id="catChart" role="img" aria-label="Bar chart of average top-1 probability by ESC-50 category"></canvas></div>
    </div>
    <div class="chart-panel">
      <h2>위험음 클래스별 점수 (avg / max)</h2>
      <div class="score-rows" id="score-rows"></div>
    </div>
  </div>

  <div class="controls">
    <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
    <button class="filter-btn" onclick="setFilter('hit',this)">예측 일치</button>
    <button class="filter-btn" onclick="setFilter('miss',this)">예측 불일치</button>
    <button class="filter-btn" onclick="setFilter('danger',this)">위험음</button>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="검색..." oninput="renderTable()">
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
let DATA = [], HEADERS = [], SCORE_COLS = [], currentFilter = 'all', sortCol = null, sortDir = 1;

const DANGER_CATS = ["car_horn","siren","engine","dog","crying_baby","crackling_fire","fireworks","clapping"];

const SCORE_COLORS = ['#4af','#fa4','#f55','#a8f','#5c8'];

let catChartInstance = null;

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].replace(/^\uFEFF/,'').split(',').map(h=>h.replace(/^"|"$/g,'').trim());
  const rows = lines.slice(1).map(line=>{
    const cols = [];
    let cur = '', inQ = false;
    for(let c of line){
      if(c==='"') inQ=!inQ;
      else if(c===',' && !inQ){ cols.push(cur.trim()); cur=''; }
      else cur+=c;
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h,i)=>{ const v=cols[i]||''; obj[h]=isNaN(v)||v===''?v:parseFloat(v); });
    return obj;
  });
  return { headers, rows };
}

function isHit(row) {
  const cat = (row['esc50_category']||'').toLowerCase().replace(/_/g,' ');
  const pred = (row['top1_audioset']||'').toLowerCase();
  if(!cat||!pred) return false;
  if(pred.includes(cat)) return true;
  const aliases = {
    siren:['siren','civil defense'], car_horn:['vehicle horn','car horn','honking'],
    dog:['dog'], fireworks:['fireworks'], clapping:['applause','tap','clapping'],
    insects:['insect'], rain:['rain'], door_wood_knock:['knock'],
    mouse_click:['click','typing'], crow:['crow'],
    vacuum_cleaner:['vacuum'], toilet_flush:['water'], glass_breaking:['glass']
  };
  const a = aliases[row['esc50_category']];
  if(a) return a.some(k=>pred.includes(k));
  return false;
}

function loadData(text) {
  const parsed = parseCSV(text);
  HEADERS = parsed.headers;
  DATA = parsed.rows;
  SCORE_COLS = HEADERS.filter(h=>h.startsWith('score_'));
  renderDashboard();
}

function renderDashboard() {
  document.getElementById('upload-zone').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('reload-btn').style.display = 'block';

  document.getElementById('file-info').innerHTML =
    `로드된 파일 — <span>${DATA.length}개 샘플</span>, <span>${SCORE_COLS.length}개 위험음 클래스</span>`;

  renderMetrics();
  renderCharts();
  renderScoreBars();
  renderTableHead();
  renderTable();
}

function renderMetrics() {
  const hits = DATA.filter(isHit).length;
  const avgProb = DATA.reduce((s,r)=>s+(r['top1_prob']||0),0)/DATA.length;
  const allScores = DATA.flatMap(r=>SCORE_COLS.map(k=>r[k]||0));
  const maxScore = Math.max(...allScores);
  const cats = [...new Set(DATA.map(r=>r['esc50_category']))].length;

  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="val">${DATA.length}</div><div class="lbl">총 샘플</div></div>
    <div class="metric"><div class="val accent">${(hits/DATA.length*100).toFixed(1)}%</div><div class="lbl">예측 일치율</div></div>
    <div class="metric"><div class="val">${(avgProb*100).toFixed(1)}%</div><div class="lbl">평균 top-1 확률</div></div>
    <div class="metric"><div class="val warn">${maxScore.toFixed(4)}</div><div class="lbl">위험음 최고 점수</div></div>
    <div class="metric"><div class="val">${cats}</div><div class="lbl">ESC-50 카테고리</div></div>
    <div class="metric"><div class="val">${hits}</div><div class="lbl">일치 샘플 수</div></div>
  `;
}

function renderCharts() {
  const catGroups = {};
  DATA.forEach(r=>{
    const c = r['esc50_category'];
    if(!catGroups[c]) catGroups[c]=[];
    catGroups[c].push(r['top1_prob']||0);
  });
  const cats = Object.keys(catGroups).sort();
  const avgs = cats.map(c=>parseFloat((catGroups[c].reduce((a,v)=>a+v,0)/catGroups[c].length*100).toFixed(1)));

  if(catChartInstance) catChartInstance.destroy();
  catChartInstance = new Chart(document.getElementById('catChart'), {
    type: 'bar',
    data: {
      labels: cats,
      datasets: [{
        data: avgs,
        backgroundColor: cats.map(c=>DANGER_CATS.includes(c)?'rgba(68,170,255,0.7)':'rgba(80,80,80,0.5)'),
        borderRadius: 2,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx=>`${ctx.parsed.y.toFixed(1)}%` }
      }},
      scales: {
        x: { ticks: { color:'#555', font:{size:10,family:'Courier New'}, maxRotation:40, autoSkip:false }, grid:{display:false}, border:{color:'#1a1a1a'} },
        y: { ticks: { color:'#555', font:{size:10,family:'Courier New'}, callback:v=>v+'%' }, grid:{color:'#111'}, border:{color:'#1a1a1a'} }
      }
    }
  });
}

function renderScoreBars() {
  const maxAvg = Math.max(...SCORE_COLS.map(k=>DATA.reduce((s,r)=>s+(r[k]||0),0)/DATA.length));
  document.getElementById('score-rows').innerHTML = SCORE_COLS.map((k,i)=>{
    const avg = DATA.reduce((s,r)=>s+(r[k]||0),0)/DATA.length;
    const max = Math.max(...DATA.map(r=>r[k]||0));
    const pct = maxAvg>0?(avg/maxAvg*100).toFixed(1):0;
    const label = k.replace('score_','').replace(/_/g,' ');
    return `<div class="score-row">
      <div class="name">${label}</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${SCORE_COLORS[i%SCORE_COLORS.length]}"></div></div>
      <div class="nums">avg ${avg.toFixed(4)} · max ${max.toFixed(4)}</div>
    </div>`;
  }).join('');
}

function renderTableHead() {
  const cols = ['filename','esc50_category','top1_audioset','top1_prob','일치',...SCORE_COLS];
  document.getElementById('thead').innerHTML = `<tr>${cols.map(c=>`<th onclick="sortTable('${c}')">${c.replace('score_','')}</th>`).join('')}</tr>`;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function sortTable(col) {
  if(sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=1; }
  document.querySelectorAll('thead th').forEach(th=>{
    th.classList.toggle('sorted', th.textContent===col||th.textContent===col.replace('score_',''));
  });
  renderTable();
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  let rows = DATA.filter(r=>{
    if(q && !Object.values(r).some(v=>String(v).toLowerCase().includes(q))) return false;
    if(currentFilter==='hit') return isHit(r);
    if(currentFilter==='miss') return !isHit(r);
    if(currentFilter==='danger') return DANGER_CATS.includes(r['esc50_category']);
    return true;
  });

  if(sortCol) {
    rows = [...rows].sort((a,b)=>{
      const av=a[sortCol]==='일치'?isHit(a)?1:0:a[sortCol];
      const bv=b[sortCol]==='일치'?isHit(b)?1:0:b[sortCol];
      if(typeof av==='number'&&typeof bv==='number') return (av-bv)*sortDir;
      return String(av).localeCompare(String(bv))*sortDir;
    });
  }

  const maxScore = Math.max(...DATA.flatMap(r=>SCORE_COLS.map(k=>r[k]||0)));

  document.getElementById('tbody').innerHTML = rows.map(r=>{
    const hit = isHit(r);
    const prob = r['top1_prob']||0;
    const probColor = prob>0.5?'#5c8':prob>0.25?'#fa4':'#888';
    const scoreCells = SCORE_COLS.map((k,i)=>{
      const v = r[k]||0;
      const intensity = maxScore>0?v/maxScore:0;
      const color = SCORE_COLORS[i%SCORE_COLORS.length];
      const alpha = (intensity*0.6).toFixed(2);
      return `<td class="score" style="color:${intensity>0.3?color:'#555'};background:rgba(${hexToRgb(color)},${alpha})">${v.toFixed(4)}</td>`;
    }).join('');
    return `<tr>
      <td class="filename" title="${r['filename']}">${r['filename']||''}</td>
      <td class="category">${r['esc50_category']||''}</td>
      <td class="prediction">${r['top1_audioset']||''}</td>
      <td class="prob" style="color:${probColor}">${(prob*100).toFixed(1)}%</td>
      <td><span class="badge ${hit?'hit':'miss'}">${hit?'일치':'불일치'}</span></td>
      ${scoreCells}
    </tr>`;
  }).join('');
}

function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function resetUpload() {
  DATA=[]; HEADERS=[]; SCORE_COLS=[];
  document.getElementById('dashboard').style.display='none';
  document.getElementById('upload-zone').style.display='flex';
  document.getElementById('reload-btn').style.display='none';
  document.getElementById('file-input').value='';
  if(catChartInstance){ catChartInstance.destroy(); catChartInstance=null; }
}

document.getElementById('file-input').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>loadData(ev.target.result);
  reader.readAsText(file, 'utf-8');
});

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e=>{ e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', ()=>dz.classList.remove('drag'));
dz.addEventListener('drop', e=>{
  e.preventDefault(); dz.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if(!file||!file.name.endsWith('.csv')) return;
  const reader = new FileReader();
  reader.onload = ev=>loadData(ev.target.result);
  reader.readAsText(file, 'utf-8');
});
</script>
</body>
</html>
